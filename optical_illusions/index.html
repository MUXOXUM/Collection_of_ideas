<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optical Illusions</title>
  <style>
    :root {
      --bg: #050505;
      --frame: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.04), transparent 42%),
        linear-gradient(180deg, #111111, var(--bg));
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .illusion {
      display: block;
      max-width: min(92vw, 1600px);
      max-height: 92vh;
      width: auto;
      height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      border: 1px solid var(--frame);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      background: #0c0c0c;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .stage {
        padding: 12px;
      }

      .illusion {
        max-width: 96vw;
        max-height: 96vh;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="sr-only">Коллекция оптических иллюзий</h1>
    <img
      class="illusion"
      id="illusion"
      src=""
      alt="Оптическая иллюзия"
    >
  </main>

  <script>
    const fallbackIllusions = [
      "./images/2023-05-24_15.43.04_680.jpeg",
      "./images/2023-05-24_15.43.27_929.jpg",

    ];
    const imageExtensions = /\.(avif|gif|jpe?g|png|svg|webp)$/i;

    const image = document.getElementById("illusion");
    let illusions = [];
    let currentIndex = 0;

    function showIllusion(index) {
      if (!illusions.length) {
        return;
      }

      currentIndex = (index + illusions.length) % illusions.length;
      image.src = illusions[currentIndex];
      image.alt = `Оптическая иллюзия ${currentIndex + 1}`;
    }

    async function loadIllusionsFromDirectory() {
      const response = await fetch("./images/");

      if (!response.ok) {
        throw new Error(`Failed to read directory: ${response.status}`);
      }

      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const discovered = [...doc.querySelectorAll('a[href]')]
        .map((link) => link.getAttribute("href")?.trim() ?? "")
        .filter((href) => href && !href.startsWith("?") && !href.startsWith("#"))
        .map((href) => href.split("/").pop() ?? "")
        .filter((fileName) => imageExtensions.test(fileName))
        .map((fileName) => `./images/${fileName}`)
        .sort((left, right) => left.localeCompare(right, "ru"));

      if (!discovered.length) {
        throw new Error("No images found in directory listing.");
      }

      return [...new Set(discovered)];
    }

    async function initializeGallery() {
      try {
        illusions = await loadIllusionsFromDirectory();
      } catch (error) {
        console.warn("Automatic image discovery is unavailable, using fallback list.", error);
        illusions = fallbackIllusions;
      }

      showIllusion(0);

      // Preload the rest of the images so page switching stays instant.
      for (const src of illusions.slice(1)) {
        const preload = new Image();
        preload.src = src;
      }
    }

    function handleNavigation(event) {
      if (!illusions.length || event.repeat) {
        return;
      }

      const key = event.key.toLowerCase();

      if (key === "arrowright" || key === "d" || key === "в") {
        event.preventDefault();
        showIllusion(currentIndex + 1);
      }

      if (key === "arrowleft" || key === "a" || key === "ф") {
        event.preventDefault();
        showIllusion(currentIndex - 1);
      }
    }

    window.addEventListener("keydown", handleNavigation);
    initializeGallery();
  </script>
</body>
</html>
