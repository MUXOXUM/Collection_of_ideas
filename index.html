<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сборник идей</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --paper: rgba(18, 18, 22, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --line-strong: rgba(255, 255, 255, 0.8);
      --text: #f8f6f1;
      --muted: rgba(248, 246, 241, 0.78);
      --status-bg: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #f7f7f3 0%, #b6b6b1 22%, #52525a 58%, #000000 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      padding: 22px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 38rem;
    }

    .projects {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--line-strong);
    }

    .projects[data-loading="true"]::before,
    .projects[data-empty="true"]::before {
      display: block;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--status-bg);
      color: var(--muted);
      font-weight: 500;
      border: 1px solid var(--line);
    }

    .projects[data-loading="true"]::before {
      content: "Ищу проекты...";
    }

    .projects[data-empty="true"]::before {
      content: "Проекты с index.html не найдены.";
    }

    .project-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .project-link {
      text-decoration: none;
      color: var(--text);
      font-size: 1.02rem;
      font-weight: 500;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .project-link:hover {
      color: #ffffff;
      opacity: 0.92;
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Сборник идей</h1>
    <ol class="projects" data-loading="true"></ol>
  </main>
  <script src="./projects.js"></script>
  <script>
    const projectsContainer = document.querySelector(".projects");

    function renderProjects(projects) {
      projectsContainer.innerHTML = "";
      projectsContainer.removeAttribute("data-loading");

      if (!projects.length) {
        projectsContainer.setAttribute("data-empty", "true");
        return;
      }

      projectsContainer.removeAttribute("data-empty");

      for (const project of projects) {
        const item = document.createElement("li");
        item.className = "project-item";

        const link = document.createElement("a");
        link.className = "project-link";
        link.href = project.path;
        link.textContent = project.title;

        item.append(link);
        projectsContainer.append(item);
      }
    }

    function findProjects() {
      try {
        const projects = Array.isArray(window.PROJECTS) ? window.PROJECTS : [];
        renderProjects(Array.isArray(projects) ? projects : []);
      } catch (error) {
        console.error(error);
        renderProjects([]);
      }
    }

    findProjects();
  </script>
</body>
</html>
