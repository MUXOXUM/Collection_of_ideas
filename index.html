<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сборник идей</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-deep: #0f172a;
      --card: rgba(10, 18, 32, 0.88);
      --card-border: rgba(148, 163, 184, 0.16);
      --text: #e5eefc;
      --muted: #9cb1cc;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --status-bg: rgba(148, 163, 184, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #040814 0%, var(--bg) 50%, var(--bg-deep) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.48);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.5;
      color: var(--muted);
    }

    .projects {
      display: grid;
      gap: 12px;
    }

    .projects[data-loading="true"]::before,
    .projects[data-empty="true"]::before {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--status-bg);
      color: var(--muted);
      text-align: center;
      font-weight: 500;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .projects[data-loading="true"]::before {
      content: "Ищу проекты...";
    }

    .projects[data-empty="true"]::before {
      content: "Проекты с index.html не найдены.";
    }

    .project-link {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      background: var(--accent);
      color: #03111f;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .project-link:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Сборник идей</h1>
    <p>Здесь собраны мои мини-проекты.</p>
    <div class="projects" data-loading="true"></div>
  </main>
  <script src="./projects.js"></script>
  <script>
    const projectsContainer = document.querySelector(".projects");

    function renderProjects(projects) {
      projectsContainer.innerHTML = "";
      projectsContainer.removeAttribute("data-loading");

      if (!projects.length) {
        projectsContainer.setAttribute("data-empty", "true");
        return;
      }

      projectsContainer.removeAttribute("data-empty");

      for (const project of projects) {
        const link = document.createElement("a");
        link.className = "project-link";
        link.href = project.path;
        link.textContent = project.title;
        projectsContainer.append(link);
      }
    }

    function findProjects() {
      try {
        const projects = Array.isArray(window.PROJECTS) ? window.PROJECTS : [];
        renderProjects(Array.isArray(projects) ? projects : []);
      } catch (error) {
        console.error(error);
        renderProjects([]);
      }
    }

    findProjects();
  </script>
</body>
</html>
